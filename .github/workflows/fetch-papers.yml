name: Daily Paper Filter

on:
  schedule:
    - cron: '0 8 * * *'  # 每天北京时间8点运行
  workflow_dispatch:      # 允许手动触发

permissions:
  contents: write        # 允许写入仓库内容
  pages: write          # 允许写入Pages
  id-token: write       # 允许部署到Pages

jobs:
  fetch-and-filter:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install feedparser openai beautifulsoup4 requests
    
    - name: Fetch and filter papers
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        RESEARCH_TOPICS: ${{ secrets.RESEARCH_TOPICS }}
      run: python scripts/fetch_papers.py
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        keep_files: true
