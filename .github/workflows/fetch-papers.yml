name: Daily Paper Filter

on:
  schedule:
    - cron: '0 8 * * *'  # 每天北京时间8点运行
  workflow_dispatch:      # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-filter:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install feedparser openai beautifulsoup4 requests
    
    - name: Fetch and filter papers
      env:
        RESEARCH_KEYWORDS: ${{ secrets.RESEARCH_KEYWORDS }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}        # AI解析需要
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}      # DeepSeek需要
      run: python scripts/fetch_papers.py
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        keep_files: true
